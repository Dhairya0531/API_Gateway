groups:
  - name: gateway.rules
    interval: 30s
    rules:
      # Recording rule for p95 request duration
      - record: gateway_request_duration_seconds_p95
        expr: histogram_quantile(0.95, sum(rate(gateway_request_duration_seconds_bucket[5m])) by (le))

      # Alert: high p95 latency
      - alert: GatewayHighP95Latency
        expr: gateway_request_duration_seconds_p95 > 0.5
        for: 2m
        labels:
          severity: page
        annotations:
          summary: "Gateway p95 latency is high (>{{ $value }}s)"
          description: "p95 request latency for the gateway is > 0.5s for more than 2 minutes."

      # Alert: elevated error rate
      - alert: GatewayHighErrorRate
        expr: sum(rate(gateway_requests_total{status=~"5.."}[5m])) / sum(rate(gateway_requests_total[5m])) > 0.05
        for: 1m
        labels:
          severity: page
        annotations:
          summary: "High 5xx error rate in gateway"
          description: "More than 5% of gateway requests are 5xx over the last 5 minutes."

      # Alert: upstream down (uses upstream health metric)
      - alert: UpstreamDown
        expr: sum(gateway_upstream_health == 0) by (service) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Upstream service down"
          description: "One or more upstream instances are reporting unhealthy."
