server:
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s

auth:
  enabled: true
  valid_tokens:
    - "secret123"
    - "devtoken456"

# JWT validation (RS256 via JWKS).
# Set enabled: true and configure your auth server's JWKS endpoint.
# When enabled, the static valid_tokens above are ignored.
jwt:
  enabled: false
  jwks_url: "https://your-auth-server/.well-known/jwks.json"
  issuer: "https://your-auth-server"
  audience: "api-gateway"

# Mutual TLS for upstream backends.
# Run certs/gen_certs.sh first to generate the certificate files.
tls:
  enabled: false
  ca_cert: "certs/ca.crt"
  client_cert: "certs/gateway.crt"
  client_key: "certs/gateway.key"

routes:
  - path: /users
    service: users
    timeout: 10s
    rate_limit:
      requests_per_minute: 100

  - path: /payments
    service: payments
    timeout: 15s
    rate_limit:
      requests_per_minute: 10

  - path: /transactions
    service: transactions
    timeout: 10s
    rate_limit:
      requests_per_minute: 50

services:
  users:
    upstreams:
      - http://localhost:9001
      - http://localhost:9004
    health_check:
      path: /health
      interval: 10s
      timeout: 2s
    balance_strategy: least-connections

  payments:
    upstreams:
      - http://localhost:9002
    health_check:
      path: /health
      interval: 10s
      timeout: 2s
    balance_strategy: weighted-latency

  transactions:
    upstreams:
      - http://localhost:9003
    health_check:
      path: /health
      interval: 10s
      timeout: 2s
    balance_strategy: round-robin

redis:
  addr: localhost:6379
  password: ""
  db: 0

postgres:
  host: localhost
  port: 5432
  user: gateway
  password: gateway
  dbname: gateway_logs
  sslmode: disable
