name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'
        
    - name: Install dependencies
      run: go mod download

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v3
      with:
        version: latest
        
    - name: Run Tests
      run: go test -v -race ./...

    - name: Build Gateway
      run: CGO_ENABLED=0 go build -o gateway ./cmd/gateway

    - name: Build Docker Image
      run: docker build -t api-gateway:test -f docker/Dockerfile .
