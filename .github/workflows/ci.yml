name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25.6'
        
    - name: Install dependencies
      run: go mod download

    - name: Install golangci-lint (build with runner Go)
      run: |
        export PATH="$PATH:$(go env GOPATH 2>/dev/null)/bin:$HOME/go/bin"
        go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
        golangci-lint --version

    - name: Run golangci-lint
      run: golangci-lint run --out-format=github-actions
        
    - name: Run Tests
      run: go test -v -race ./...

    - name: Build Gateway
      run: CGO_ENABLED=0 go build -o gateway ./cmd/gateway

    - name: Build Docker Image
      run: docker build -t api-gateway:test -f docker/Dockerfile .
